server {
    listen 80;
    # 若有網域請將 _ 改為您的網域名稱，例如 example.com
    server_name _;

    # 前端 Nuxt 路由
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 路由轉發至 Backend
    location /api/ {
        # 移除 /api 前綴，並轉發到 backend:8002
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sitemap 轉發
    location /sitemap.xml {
        proxy_pass http://backend:8002/sitemap.xml;
        proxy_set_header Host $host;
    }

    # LINE Bot Webhook 轉發
    location /line_ai_bot/ {
        proxy_pass http://backend:8002/line_ai_bot/;
        proxy_set_header Host $host;
    }
}
